<!DOCTYPE html>
<html lang="en" data-theme="electric">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>FIG. 1 — Choral Hurdy-Gurdy (design mockup)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --color-bg:             #0f0e0c;
  --color-surface:        #1c1a16;
  --color-border:         #3a3630;
  --color-text-primary:   #e8e0d0;
  --color-text-secondary: #938a78;
  --color-accent-1:       #c4621d;
  --color-accent-2:       #8b6fc0;
  --color-accent-3:       #5a9068;
  --color-signal:         #d4a017;
  --color-accent-5:       #7a9bab;
  --color-accent-6:       #b86278;
  --color-danger:         #8b2e2e;
  --font-display: 'Playfair Display', serif;
  --font-body: 'IBM Plex Mono', monospace;
}
[data-theme="candlelight"] {
  --color-bg:             #f5edd8;
  --color-surface:        #ede1c6;
  --color-border:         #c8b89a;
  --color-text-primary:   #1a120a;
  --color-text-secondary: #6b5640;
  --color-accent-1:       #9e3d0a;
  --color-accent-2:       #6b4fa0;
  --color-accent-3:       #3a7048;
  --color-signal:         #a47c07;
  --color-accent-5:       #5a7b8b;
  --color-accent-6:       #985268;
  --color-danger:         #8b2e2e;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: var(--color-bg);
  color: var(--color-text-primary);
  font-family: var(--font-body);
  display: flex; flex-direction: column; align-items: center;
  padding: 48px 12px;
}
.wrap { width: 100%; max-width: 760px; }
.mockbar {
  display: flex; justify-content: space-between; align-items: baseline;
  margin-bottom: 24px; font-size: 0.72rem; color: var(--color-text-secondary);
  letter-spacing: 0.08em; text-transform: uppercase;
}
.mockbar button {
  background: transparent; border: 1px solid var(--color-accent-1);
  color: var(--color-accent-1); font-family: var(--font-body);
  font-size: 0.72rem; letter-spacing: 0.06em; text-transform: uppercase;
  padding: 6px 12px; border-radius: 2px; cursor: pointer;
}
.caption {
  margin-top: 24px; font-size: 0.85rem; line-height: 1.6;
  color: var(--color-text-secondary);
}
.caption em { color: var(--color-text-primary); font-style: italic; }
svg text { font-family: var(--font-body); }
</style>
</head>
<body>
<div class="wrap">
  <div class="mockbar">
    <span>design mockup · static · no audio</span>
    <button onclick="toggle()">switch theme</button>
  </div>
  <svg id="fig" viewBox="0 0 760 560" width="100%" aria-label="Patent-style drawing of the choral hurdy-gurdy"></svg>
  <p class="caption">Every turn of the crank plays a chorale no one has heard
  before — composed, verified against the laws of voice leading, and
  numbered, <em>in your browser</em>.</p>
</div>
<script>
const PIECE = {"notes": [[0,0,2,71],[0,2,2,76],[0,4,2,74],[0,6,1,72],[0,7,1,71],[0,8,2,71],[0,10,2,72],[0,12,2,72],[0,14,2,71],[0,16,2,69],[0,18,2,67],[0,20,2,66],[0,22,2,67],[0,24,2,69],[0,26,2,67],[1,0,2,65],[1,2,2,64],[1,4,2,66],[1,6,2,67],[1,8,2,67],[1,10,2,64],[1,12,2,64],[1,14,2,62],[1,16,2,60],[1,18,1,60],[1,19,1,59],[1,20,2,62],[1,22,2,62],[1,24,2,60],[1,26,2,59],[2,0,2,59],[2,2,2,60],[2,4,2,57],[2,6,2,55],[2,8,1,55],[2,9,1,57],[2,10,2,60],[2,12,2,57],[2,14,2,55],[2,16,1,55],[2,17,1,53],[2,18,2,52],[2,20,2,50],[2,22,2,50],[2,24,2,48],[2,26,2,50],[3,0,2,43],[3,2,2,48],[3,4,2,50],[3,6,2,52],[3,8,1,52],[3,9,1,50],[3,10,2,48],[3,12,2,45],[3,14,2,43],[3,16,2,45],[3,18,2,48],[3,20,1,46],[3,21,1,45],[3,22,2,43],[3,24,2,36],[3,26,2,43]], "ferm": [8, 18, 26], "total": 28};

const css = n => getComputedStyle(document.documentElement).getPropertyValue(n).trim();
const NS = 'http://www.w3.org/2000/svg';
function el(tag, attrs, parent) {
  const e = document.createElementNS(NS, tag);
  for (const k in attrs) e.setAttribute(k, attrs[k]);
  parent.appendChild(e);
  return e;
}

function draw() {
  const svg = document.getElementById('fig');
  svg.innerHTML = '';
  const border = css('--color-border'), surface = css('--color-surface'),
        bg = css('--color-bg'), txt = css('--color-text-primary'),
        sub = css('--color-text-secondary'), sienna = css('--color-accent-1'),
        signal = css('--color-signal');
  const voiceColor = [css('--color-accent-1'), css('--color-accent-2'),
                      css('--color-accent-3'), css('--color-signal')];

  // cross-hatch pattern (the system's replacement for shadows)
  const defs = el('defs', {}, svg);
  const pat = el('pattern', {id:'hatch', width:5, height:5,
                 patternUnits:'userSpaceOnUse', patternTransform:'rotate(45)'}, defs);
  el('line', {x1:0, y1:0, x2:0, y2:5, stroke:border, 'stroke-width':1}, pat);
  const patD = el('pattern', {id:'hatchD', width:3.4, height:3.4,
                 patternUnits:'userSpaceOnUse', patternTransform:'rotate(45)'}, defs);
  el('line', {x1:0, y1:0, x2:0, y2:3.4, stroke:sub, 'stroke-width':1}, patD);

  // ---- title block ----
  const t1 = el('text', {x:36, y:34, fill:txt, 'font-size':15,
                'letter-spacing':'0.14em'}, svg);
  t1.textContent = 'FIG. 1 — CHORAL HURDY-GURDY';
  const t2 = el('text', {x:36, y:52, fill:sub, 'font-size':10,
                'letter-spacing':'0.1em'}, svg);
  t2.textContent = 'AN INFINITE LIBRARY OF VERIFIED CHORALES, HAND-CRANKED';

  // ---- cabinet ----
  const BX = 36, BY = 76, BW = 640, BH = 380;
  // side depth: offset hatched slab (patent-drawing depth, not shadow)
  el('rect', {x:BX+10, y:BY+10, width:BW, height:BH, fill:'url(#hatch)',
              stroke:border, 'stroke-width':1}, svg);
  el('rect', {x:BX, y:BY, width:BW, height:BH, fill:bg,
              stroke:txt, 'stroke-width':1.4}, svg);

  // ---- tape window ----
  const TX = BX+24, TY = BY+24, TW = BW-48, TH = 212;
  el('rect', {x:TX-6, y:TY-6, width:TW+12, height:TH+12, fill:'none',
              stroke:border, 'stroke-width':1}, svg);
  el('rect', {x:TX, y:TY, width:TW, height:TH, fill:surface,
              stroke:border, 'stroke-width':1}, svg);
  // sprocket holes along tape edges
  for (let x = TX+8; x < TX+TW-4; x += 16) {
    el('circle', {cx:x, cy:TY+8, r:1.6, fill:'none', stroke:sub,
                  'stroke-width':0.8}, svg);
    el('circle', {cx:x, cy:TY+TH-8, r:1.6, fill:'none', stroke:sub,
                  'stroke-width':0.8}, svg);
  }
  // pitch guide rules (faint staff-like grid)
  for (let i = 1; i <= 4; i++) {
    el('line', {x1:TX, y1:TY+18+i*(TH-36)/5, x2:TX+TW, y2:TY+18+i*(TH-36)/5,
                stroke:border, 'stroke-width':0.5, 'stroke-dasharray':'2 6',
                opacity:0.6}, svg);
  }

  // ---- geometry of time ----
  const EW = 26;                     // px per eighth
  const PH = TX + 190;               // playhead x
  const soundingEighth = 10;         // mid-phrase: a normal chord is sounding
  const originX = PH - soundingEighth * EW;

  // beat ruling — chords become visible columns
  for (let e = 0; e <= PIECE.total; e += 2) {
    const x = originX + e * EW;
    if (x > TX+4 && x < TX+TW-4)
      el('line', {x1:x, y1:TY+14, x2:x, y2:TY+TH-14, stroke:border,
                  'stroke-width':0.5, opacity:0.55}, svg);
  }

  // playhead
  el('line', {x1:PH, y1:TY-10, x2:PH, y2:TY+TH+10, stroke:signal,
              'stroke-width':1, 'stroke-dasharray':'4 3'}, svg);
  el('path', {d:`M ${PH-4} ${TY-14} L ${PH+4} ${TY-14} L ${PH} ${TY-7} Z`,
              fill:signal}, svg);

  // ---- holes from the real piece ----
  const midiLo = 34, midiHi = 80;
  const pitchY = m => TY + 14 + (TH - 28) * (1 - (m - midiLo) / (midiHi - midiLo));
  const fermStarts = PIECE.ferm.map(f => (f - 1) * 2);
  const soundingAt = soundingEighth;

  // phrase perforation lines
  for (const f of PIECE.ferm) {
    const x = originX + (f * 2) * EW;
    if (x > TX && x < TX+TW)
      el('line', {x1:x, y1:TY+4, x2:x, y2:TY+TH-4, stroke:border,
                  'stroke-width':1, 'stroke-dasharray':'1 4'}, svg);
  }
  for (const [v, s, ln, m] of PIECE.notes) {
    const x = originX + s * EW + (ln * EW) / 2;
    if (x < TX + 8 || x > TX + TW - 8) continue;
    const y = pitchY(m);
    const c = voiceColor[v];
    const isFerm = fermStarts.includes(s);
    const sounding = s <= soundingAt && soundingAt < s + ln;
    const passed = s + ln <= soundingAt;
    const r = ln >= 2 ? 6 : 3.6;     // ornaments are smaller punches
    if (isFerm) {                    // fermata: an elongated punched slot
      el('rect', {x: originX + s*EW + 6, y: y-3.5, width: EW*2 - 12, height: 7,
                  rx: 3.5, fill: (sounding || passed) ? c : 'none', stroke: c,
                  'stroke-width': 1.2, opacity: passed ? 0.45 : 1}, svg);
    } else if (sounding) {
      el('circle', {cx:x, cy:y, r:r+2.4, fill:'none', stroke:c,
                    'stroke-width':1}, svg);
      el('circle', {cx:x, cy:y, r:r, fill:c}, svg);
    } else {
      el('circle', {cx:x, cy:y, r:r, fill: passed ? c : 'none', stroke:c,
                    'stroke-width':1.4, opacity: passed ? 0.45 : 1}, svg);
    }
  }

  // voice key, engraved under tape window
  const voices = ['SOPRANO', 'ALTO', 'TENOR', 'BASS'];
  voices.forEach((name, i) => {
    const x = TX + 6 + i * 110;
    el('circle', {cx:x, cy:TY+TH+18, r:3.4, fill:voiceColor[i]}, svg);
    const t = el('text', {x:x+10, y:TY+TH+21.5, fill:sub, 'font-size':9,
                  'letter-spacing':'0.1em'}, svg);
    t.textContent = name;
  });

  // ---- lower panel: plate, motor, bpm ----
  const LY = BY + BH - 96;
  el('line', {x1:BX, y1:LY-14, x2:BX+BW, y2:LY-14, stroke:border,
              'stroke-width':1}, svg);

  // engraved plate (double border)
  el('rect', {x:BX+24, y:LY, width:300, height:64, fill:'none', stroke:txt,
              'stroke-width':1}, svg);
  el('rect', {x:BX+28, y:LY+4, width:292, height:56, fill:'none',
              stroke:border, 'stroke-width':1}, svg);
  const p1 = el('text', {x:BX+40, y:LY+26, fill:txt, 'font-size':13,
                'letter-spacing':'0.12em'}, svg);
  p1.textContent = 'No. 0217';
  const p2 = el('text', {x:BX+40, y:LY+46, fill:sub, 'font-size':9.5,
                'letter-spacing':'0.1em'}, svg);
  p2.textContent = 'G MAJOR · 3 PHRASES · 0 VIOLATIONS';
  const dl = el('text', {x:BX+24, y:LY+82, fill:sienna, 'font-size':9.5,
                'letter-spacing':'0.08em'}, svg);
  dl.textContent = 'EXPORT .MID ↓';

  // motor toggle
  el('rect', {x:BX+348, y:LY+8, width:88, height:30, rx:2, fill:sienna}, svg);
  const mt = el('text', {x:BX+392, y:LY+27, fill:bg, 'font-size':11,
                'letter-spacing':'0.1em', 'text-anchor':'middle'}, svg);
  mt.textContent = 'MOTOR';
  // bpm odometer
  el('rect', {x:BX+348, y:LY+44, width:88, height:22, fill:surface,
              stroke:border, 'stroke-width':1}, svg);
  const bp = el('text', {x:BX+392, y:LY+59, fill:signal, 'font-size':11,
                'letter-spacing':'0.18em', 'text-anchor':'middle'}, svg);
  bp.textContent = '072 BPM';

  // ---- the crank (through the cabinet wall) ----
  const wall = BX + BW;
  const CXc = wall + 26, CYc = LY + 28;
  el('rect', {x:wall-2, y:CYc-5, width:14, height:10, fill:bg, stroke:txt,
              'stroke-width':1.2}, svg);                     // axle housing
  el('line', {x1:wall+12, y1:CYc, x2:CXc, y2:CYc, stroke:txt,
              'stroke-width':3}, svg);                       // axle stub
  el('circle', {cx:CXc, cy:CYc, r:17, fill:'url(#hatch)', stroke:txt,
                'stroke-width':1.4}, svg);                   // crank disc
  el('circle', {cx:CXc, cy:CYc, r:2.6, fill:txt}, svg);      // axle center
  el('line', {x1:CXc, y1:CYc, x2:CXc+13, y2:CYc-24, stroke:txt,
              'stroke-width':3}, svg);                       // arm to grip
  el('circle', {cx:CXc+16, cy:CYc-29, r:6.5, fill:sienna, stroke:txt,
                'stroke-width':1.2}, svg);                   // grip
  // rotation arrow
  el('path', {d:`M ${CXc-26} ${CYc-18} A 32 32 0 0 1 ${CXc+6} ${CYc-31}`,
              fill:'none', stroke:sub, 'stroke-width':1,
              'stroke-dasharray':'3 3'}, svg);
  el('path', {d:`M ${CXc+2} ${CYc-37} L ${CXc+10} ${CYc-31} L ${CXc} ${CYc-27} Z`,
              fill:sub}, svg);

  // ---- annotations with leader lines ----
  function note(x1, y1, x2, y2, lines, anchor='start') {
    el('line', {x1, y1, x2, y2, stroke:sub, 'stroke-width':0.8,
                'stroke-dasharray':'2 3'}, svg);
    el('circle', {cx:x1, cy:y1, r:1.8, fill:sub}, svg);
    lines.forEach((s, i) => {
      const t = el('text', {x:x2 + (anchor==='start'?6:-6), y:y2 + 3.5 + i*13,
                    fill:sub, 'font-size':9.5, 'letter-spacing':'0.08em',
                    'text-anchor':anchor}, svg);
      t.textContent = s;
    });
  }
  const compact = document.documentElement.clientWidth < 560;
  if (!compact) {
    note(PH, TY+TH+10, PH+6, BY+BH+78, ['PLAYHEAD — the present moment'], 'start');
    note(BX+174, LY+64, BX+110, BY+BH+42, ['PLATE — each piece numbered,', 'composed & verified on arrival'], 'start');
    note(BX+436, LY+23, BX+474, BY+BH+24, ['MOTOR — let it play itself'], 'start');
    note(CXc+16, CYc-29, CXc-36, BY+BH+66, ['CRANK — scroll to turn.', 'your speed is the tempo.'], 'end');
  } else {
    note(CXc+16, CYc-29, CXc-70, BY+BH+50, ['CRANK — drag to turn'], 'end');
  }
}

function toggle() {
  const h = document.documentElement;
  h.dataset.theme = h.dataset.theme === 'electric' ? 'candlelight' : 'electric';
  draw();
}
draw();
addEventListener('resize', draw);
</script>
</body>
</html>
